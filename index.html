<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BetGenius AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-7xl mx-auto p-4">
    <header class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold text-emerald-400">BetGenius AI ⚽🏀🎾</h1>
      <div class="flex gap-4">
        <button onclick="caricaLive()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg font-medium">
          <i class="fas fa-bolt"></i> LIVE
        </button>
      </div>
    </header>

    <!-- Tab Sport -->
    <div class="flex gap-2 mb-6 border-b border-gray-800">
      <button onclick="cambiaSport('football')" class="sport-tab active px-6 py-3 font-medium" data-sport="football">⚽ Calcio</button>
      <button onclick="cambiaSport('basket')" class="sport-tab px-6 py-3 font-medium" data-sport="basket">🏀 Basket</button>
      <button onclick="cambiaSport('tennis')" class="sport-tab px-6 py-3 font-medium" data-sport="tennis">🎾 Tennis</button>
    </div>

    <!-- Pulsante Genera Pronostici -->
    <div class="mb-8">
      <button onclick="generaPronostici()" 
              class="w-full bg-gradient-to-r from-emerald-500 to-cyan-500 hover:from-emerald-600 hover:to-cyan-600 text-xl font-bold py-5 rounded-2xl shadow-lg">
        ⚡ Genera Pronostici AI
      </button>
    </div>

    <!-- Lista Partite -->
    <div id="matches-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <!-- Popolato via JavaScript -->
    </div>

    <!-- Multipla -->
    <div class="fixed bottom-6 right-6 bg-gray-900 border border-emerald-500 rounded-2xl p-6 w-96 shadow-2xl">
      <h3 class="text-lg font-bold mb-4">🧾 La Tua Multipla (<span id="multipla-count">0</span>)</h3>
      <div id="multipla-list" class="max-h-64 overflow-y-auto mb-4"></div>
      <button onclick="clearMultipla()" class="text-red-400 text-sm">Cancella tutto</button>
    </div>
  </div>

  <script>
    const API_BASE = "https://betgenius-backend.onrender.com";

    let currentSport = "football";
    let multipla = [];

    function cambiaSport(sport) {
      currentSport = sport;
      document.querySelectorAll('.sport-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.sport === sport);
        tab.classList.toggle('text-emerald-400', tab.dataset.sport === sport);
      });
      caricaPartite();
    }

    async function caricaPartite() {
      const container = document.getElementById('matches-container');
      container.innerHTML = '<p class="col-span-3 text-center py-12 text-gray-400">Caricamento partite...</p>';

      try {
        const res = await fetch(`${API_BASE}/matches/${currentSport}`);
        const data = await res.json();

        if (data.error) {
          container.innerHTML = `<p class="text-red-400">Errore: ${data.error}</p>`;
          return;
        }

        let html = '';
        data.forEach(match => {
          html += `
            <div class="bg-gray-900 border border-gray-800 rounded-2xl p-5 hover:border-emerald-500 transition">
              <div class="text-xs text-gray-400 mb-2">${match.competition}</div>
              <div class="flex justify-between items-center mb-4">
                <div class="flex-1">
                  <p class="font-medium">${match.homeTeam.emoji} ${match.homeTeam.name}</p>
                </div>
                <div class="text-center text-gray-400 text-sm">VS</div>
                <div class="flex-1 text-right">
                  <p class="font-medium">${match.awayTeam.emoji} ${match.awayTeam.name}</p>
                </div>
              </div>
              <button onclick="aggiungiAllaMultipla('${match.id}', '${match.homeTeam.name} vs ${match.awayTeam.name}', '${currentSport}')" 
                      class="w-full bg-emerald-600 hover:bg-emerald-700 py-3 rounded-xl text-sm font-medium">
                Aggiungi alla Multipla
              </button>
            </div>`;
        });

        container.innerHTML = html || '<p class="col-span-3 text-center py-12 text-gray-400">Nessuna partita trovata</p>';
      } catch (err) {
        container.innerHTML = '<p class="text-red-400 text-center">Errore di connessione al backend</p>';
      }
    }

    function aggiungiAllaMultipla(id, matchName, sport) {
      if (multipla.some(m => m.id === id)) return;
      multipla.push({id, matchName, sport});
      document.getElementById('multipla-count').textContent = multipla.length;
      aggiornaMultiplaUI();
    }

    function aggiornaMultiplaUI() {
      const list = document.getElementById('multipla-list');
      list.innerHTML = multipla.map(m => `
        <div class="bg-gray-800 p-3 rounded-xl mb-2 text-sm">${m.matchName}</div>
      `).join('');
    }

    function clearMultipla() {
      multipla = [];
      document.getElementById('multipla-count').textContent = '0';
      aggiornaMultiplaUI();
    }

    async function generaPronostici() {
      if (multipla.length === 0) {
        alert("Aggiungi almeno una partita alla multipla prima di generare i pronostici!");
        return;
      }

      const btn = document.querySelector('button[onclick="generaPronostici()"]');
      btn.innerHTML = '🤖 Generazione in corso...';
      btn.disabled = true;

      try {
        const res = await fetch(`${API_BASE}/ai/predictions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            matches: multipla,
            sport: currentSport
          })
        });

        const data = await res.json();
        
        if (data.success) {
          let html = `<h3 class="font-bold text-emerald-400 mb-4">📊 Pronostici AI (${data.provider || 'Claude'})</h3>`;
          
          if (Array.isArray(data.predictions)) {
            data.predictions.forEach(p => {
              html += `
                <div class="bg-gray-900 border border-gray-700 p-4 rounded-2xl mb-4">
                  <p class="font-medium">${p.match}</p>
                  <p class="text-2xl font-bold text-emerald-400">${p.pronostico}</p>
                  <p class="text-sm text-gray-400">Confidenza: ${p.confidenza}%</p>
                  <p class="text-sm mt-2">${p.motivazione}</p>
                </div>`;
            });
          } else {
            html += `<pre class="bg-gray-900 p-4 rounded-2xl text-sm overflow-auto">${JSON.stringify(data.predictions, null, 2)}</pre>`;
          }

          const modal = document.createElement('div');
          modal.innerHTML = `
            <div class="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
              <div class="bg-gray-900 max-w-2xl w-full mx-4 rounded-3xl p-8 max-h-[90vh] overflow-auto">
                ${html}
                <button onclick="this.closest('.fixed').remove()" class="mt-6 w-full bg-gray-700 hover:bg-gray-600 py-4 rounded-2xl">Chiudi</button>
              </div>
            </div>`;
          document.body.appendChild(modal);
        } else {
          alert("Errore: " + (data.error || "Impossibile generare pronostici"));
        }
      } catch (err) {
        alert("Errore di connessione: " + err.message);
      } finally {
        btn.innerHTML = '⚡ Genera Pronostici AI';
        btn.disabled = false;
      }
    }

    async function caricaLive() {
      alert("Funzione LIVE in fase di sviluppo...");
      // Puoi espanderla in futuro
    }

    // Avvio
    window.onload = () => {
      cambiaSport('football');
    };
  </script>
</body>
</html>
